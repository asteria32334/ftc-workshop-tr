<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Asteria FTC Academy</title>

  <link rel="icon" href="images/blank_logo.png">
  <link rel="apple-touch-icon" href="images/logo.png">

  <!-- PWA Manifest -->
  <link rel="manifest" href="manifest.json">

  <!-- iOS ve PWA Ayarları -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Asteria FTC Academy">
  <meta name="theme-color" content="#000000">

  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
</head>

<body class="bg-zinc-950 text-white">
  <!-- Ana Ekrana Ekle Butonu -->
<button id="installBtn" 
        onclick="handleInstallClick()"
        class="fixed bottom-6 right-6 bg-black hover:bg-gray-800 text-white px-6 py-3 rounded-2xl shadow-xl flex items-center gap-2 z-50 hidden transition-all">
  <i class="fas fa-download"></i>
  <span>Ana Ekrana Ekle</span>
</button>

<script>
  let deferredPrompt;

  // Android + Chrome için otomatik algılama
  window.addEventListener('beforeinstallprompt', (e) => {
    e.preventDefault();
    deferredPrompt = e;
    document.getElementById('installBtn').classList.remove('hidden');
  });

  function handleInstallClick() {
    if (deferredPrompt) {
      // Android / Chrome
      deferredPrompt.prompt();
      deferredPrompt.userChoice.then(() => {
        deferredPrompt = null;
      });
    } else {
      // iPhone Safari
      alert("To add to home screen:\n\n" +
            "1. Click Share button on bottom right\n" +
            "2. Click more and scroll down\n" +
            "3. Click 'Add to Home Screen' \n" +
            "4. Click 'Add' "
           );
    }
  }

  // Sayfa yüklendiğinde butonu göster (iOS için yedek)
  window.addEventListener('load', () => {
    setTimeout(() => {
      if (!document.getElementById('installBtn').classList.contains('hidden') === false) {
        document.getElementById('installBtn').classList.remove('hidden');
      }
    }, 800);
  });
</script>

  <header class="bg-zinc-900 border-b border-zinc-700">
    <div class="max-w-6xl mx-auto px-6 py-5 flex justify-between items-center">
      <h1 class="text-3xl font-bold">Asteria FTC Academy</h1>
    </div>
  </header>

  <section class="py-24 bg-gradient-to-br from-blue-950 to-zinc-900 text-center">
    <div class="max-w-4xl mx-auto px-6">
      <h1 class="text-5xl md:text-6xl font-bold mb-6">0'dan FTC öğrenin</h1>
      <p class="text-2xl text-zinc-300">Ücretsiz Profesyonel Workshop Serisi</p>
    </div>
  </section>

  <section class="py-20">
    <div class="max-w-6xl mx-auto px-6">
      <h2 class="text-4xl font-bold text-center mb-12">Workshop Modülleri</h2>
      <div class="grid md:grid-cols-2 lg:grid-cols-3 gap-8" id="module-grid"></div>
    </div>
  </section>

  <script>
    const modules = [
      { id: 1, title: "FTC'ye Giriş", desc: "FIRST felsefesi ve temel kavramlar" },
      { id: 2, title: "Donanım ve Kontrol Sistemi", desc: "Control Hub, Expansion Hub ve sensörler" },
      { id: 3, title: "Hareket Sistemi Tasarımı", desc: "Tank, Mecanum, Swerve + karşılaştırması" },
      { id: 4, title: "Basit Programlama", desc: "Bloklarla TeleOp kodlaması" },
      { id: 5, title: "Autonom Programlama", desc: "Autonomous stratejileri" },
      { id: 6, title: "Mekanizma Tasarımı", desc: "Intake, Outtake, Lift + sistemleri" },
      { id: 7, title: "Engineering Notebook ve Portfolyo", desc: "Mükemmel bir portfolyonun nasıl yazılacağını öğrenin" },
      { id: 8, title: "Yarışma Stratejisi, Scouting ve Son İpuçları", desc: "Keşif Yapmayı ve Strateji Oluşturmayı Öğrenin"}
    ];

    const container = document.getElementById('module-grid');
    modules.forEach(m => {
      container.innerHTML += `
        <a href="${m.id}.html" class="block bg-zinc-900 hover:bg-zinc-800 p-8 rounded-3xl transition hover:scale-105">
          <div class="text-blue-400 text-sm mb-2">Module ${m.id}</div>
          <h3 class="text-2xl font-semibold mb-3">${m.title}</h3>
          <p class="text-zinc-400">${m.desc}</p>
        </a>
      `;
    });
  </script>
</body>
</html>
